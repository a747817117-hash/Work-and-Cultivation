<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房间大厅 - 挂机修仙</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container lobby-container">
    <div class="lobby-header">
      <h1>修仙大厅</h1>
      <div class="user-info">
        <span class="username" id="username"></span>
        <button class="btn-logout" onclick="logout()">退出</button>
      </div>
    </div>
    
    <div class="section-header">
      <h2>房间列表</h2>
      <button class="btn btn-primary btn-sm" onclick="showCreateModal()">创建房间</button>
    </div>
    
    <div id="roomsList" class="rooms-list">
      <div class="empty-state">
        <p>暂无房间</p>
        <p>点击"创建房间"开始修仙之旅</p>
      </div>
    </div>
  </div>
  
  <div id="createModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h2>创建房间</h2>
      <form id="createRoomForm">
        <div class="form-group">
          <label for="roomName">房间名称</label>
          <input type="text" id="roomName" placeholder="给房间起个名字" required>
        </div>
        <div class="form-group">
          <label for="maxStories">故事数量上限</label>
          <input type="number" id="maxStories" value="50" min="10" max="200">
        </div>
        <div class="form-group">
          <label for="storyInterval">故事间隔（分钟）</label>
          <input type="number" id="storyInterval" value="1" min="1" max="60">
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-secondary" onclick="hideCreateModal()">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="/js/lobby.js"></script>
</body>
</html>
